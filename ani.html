<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #102a43, #020617);
    overflow:hidden;
    color:white;
}

/* aurora waves */
body::before,
body::after{
    content:"";
    position:absolute;
    width:140%;
    height:140%;
    background: linear-gradient(120deg, transparent, rgba(199, 133, 197, 0.845), transparent);
    animation: wave 14s linear infinite;
}

body::after{
    animation-direction: reverse;
    opacity:0.5;
}

@keyframes wave{
    from{ transform:translateX(-30%) rotate(0deg);}
    to{ transform:translateX(30%) rotate(360deg);}
}

/* main card */
.container{
    position:relative;
    padding:70px 110px;
    border-radius:30px;
    background:linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
    backdrop-filter: blur(25px);
    box-shadow:
        0 0 60px rgba(0,255,255,0.35),
        inset 0 0 25px rgba(255,255,255,0.08);
    text-align:center;
    z-index:2;
    transition: transform .6s;
}

.container:hover{
    transform: scale(1.05) rotateX(6deg);
}

/* glowing rings */
.container::before,
.container::after{
    content:"";
    position:absolute;
    inset:-18px;
    border-radius:inherit;
    border:2px solid transparent;
    background: linear-gradient(90deg,#00f5ff,#7cffcb,#00f5ff);
    background-size:300%;
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    animation: borderMove 5s linear infinite;
}

.container::after{
    inset:-35px;
    opacity:.3;
}

@keyframes borderMove{
    from{ background-position:0%; }
    to{ background-position:300%; }
}

h1{
    font-size:3rem;
    letter-spacing:7px;
    margin-bottom:15px;
    text-shadow:0 0 15px rgba(0,255,255,0.8);
}

h2{
    font-size:5rem;
    font-weight:800;
    background:linear-gradient(90deg,#00f5ff,#ffffff,#7cffcb);
    background-size:200%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine{
    from{ background-position:0%; }
    to{ background-position:200%; }
}

/* floating orbs */
.orb{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    background:rgba(0,255,255,0.7);
    filter: blur(1px);
    animation: drift 12s infinite ease-in-out;
}

@keyframes drift{
    0%{ transform:translateY(0); opacity:.7;}
    50%{ transform:translateY(-160px); opacity:.2;}
    100%{ transform:translateY(0); opacity:.7;}
}
</style>
</head>

<body>

<div class="container">
    <h1>WELCOME TO</h1>
    <h2>2026</h2>
</div>

<!-- floating orbs -->
<div class="orb" style="top:20%; left:10%; animation-delay:0s;"></div>
<div class="orb" style="top:70%; left:20%; animation-delay:2s;"></div>
<div class="orb" style="top:30%; left:85%; animation-delay:4s;"></div>
<div class="orb" style="top:80%; left:70%; animation-delay:6s;"></div>
<div class="orb" style="top:50%; left:50%; animation-delay:8s;"></div>

</body>
</html>
